name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Workflow-level default: read-only. Jobs opt up to what they actually need.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      # Keep this tag in sync with the `playwright` version in package-lock.json.
      # Browsers in the image must match the Playwright client, or tests get flaky.
      image: mcr.microsoft.com/playwright:v1.61.0-noble
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build
