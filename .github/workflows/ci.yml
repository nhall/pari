name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Workflow-level default: read-only. Jobs opt up to what they actually need.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      # Keep this tag in sync with the `playwright` version in package-lock.json.
      # Browsers in the image must match the Playwright client, or tests get flaky.
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build
