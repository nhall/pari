name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      # Keep this tag in sync with the `playwright` version in package-lock.json.
      # Browsers in the image must match the Playwright client, or tests get flaky.
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build
