name: OpenSSF Scorecard

on:
  # Weekly run keeps the score current as the ecosystem changes.
  schedule:
    - cron: '20 7 * * 2'
  push:
    branches: [main]
  branch_protection_rule:

# Declare default permissions as read only.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload SARIF results to GitHub code scanning.
      security-events: write
      # Needed to publish results and get an OIDC token for the badge.
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to https://api.securityscorecards.dev so the badge resolves.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
