name: Release

on:
  # Auto-fire when a release tag is pushed.
  push:
    tags:
      - 'v*'
  # Manual dispatch for when a tag already exists (e.g. first-time TP setup).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.3.0)'
        required: true
        type: string

# Workflow-level default: read-only. Publish job opts up to id-token: write for OIDC.
permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm with provenance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      # Keep this tag in sync with the `playwright` version in package-lock.json.
      # Matches ci.yml so the test environment is identical.
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    # Required by npm Trusted Publishing config — npm only honors the OIDC token
    # if it carries this environment claim.
    environment: npm-publish
    permissions:
      contents: read
      # OIDC token issuance for npm provenance attestation.
      id-token: write
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # workflow_dispatch supplies the tag explicitly; push trigger uses ref_name.
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        # --ignore-scripts skips prepublishOnly so we don't run test+build twice.
        run: npm publish --provenance --access public --ignore-scripts
