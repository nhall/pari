<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Pari Smoke Test — IIFE</title>
		<script src="./node_modules/pari-components/dist/components.iife.js"></script>
	</head>
	<body>
		<h1>IIFE Bundle</h1>
		<p>Open the console. Tests run after a brief delay (IIFE registers elements before DOM parses).</p>

		<pari-disclosure id="test-disclosure">
			<button data-trigger>Toggle</button>
			<div data-content hidden>It works.</div>
		</pari-disclosure>

		<pari-notification id="test-notification">
			<div data-content popover="manual">
				<p>Smoke test notification.</p>
			</div>
		</pari-notification>

		<pari-tooltip id="test-tooltip">
			<button data-trigger>Trigger</button>
			<div data-content>Smoke test tooltip.</div>
		</pari-tooltip>

		<script>
			// Defer so the setTimeout-based connectedCallback retry has fired.
			setTimeout(() => {
				// Test 1: all components registered
				const elements = [
					'pari-disclosure',
					'pari-accordion',
					'pari-tabs',
					'pari-dialog',
					'pari-popover',
					'pari-nav-disclosure',
					'pari-notification',
					'pari-tooltip',
				];
				elements.forEach(name => {
					const defined = !!customElements.get(name);
					console.log(`1. ${name}: ${defined ? '✓ defined' : '✗ NOT defined'}`);
				});

				// Test 2: disclosure show/hide works
				const el = document.getElementById('test-disclosure');
				el.show();
				console.log('2. el.show() open state:', el.open === true ? '✓ open' : '✗ not open');
				el.hide();
				console.log('2. el.hide() open state:', el.open === false ? '✓ closed' : '✗ not closed');

				// Test 3: notification show/hide works
				const notif = document.getElementById('test-notification');
				notif.show();
				console.log('3. notif.show() open state:', notif.open === true ? '✓ open' : '✗ not open');
				notif.hide();
				console.log('3. notif.hide() open state:', notif.open === false ? '✓ closed' : '✗ not closed');

				// Test 4: tooltip ARIA wiring and show/hide
				const tooltip = document.getElementById('test-tooltip');
				const tooltipTrigger = tooltip.querySelector('[data-trigger]');
				const tooltipContent = tooltip.querySelector('[data-content]');
				console.log('4. role="tooltip":', tooltipContent.getAttribute('role') === 'tooltip' ? '✓' : '✗');
				console.log('4. aria-describedby wired:', tooltipTrigger.getAttribute('aria-describedby') === tooltipContent.id ? '✓' : '✗');
				tooltip.show();
				console.log('4. tooltip.show() open state:', tooltip.open === true ? '✓ open' : '✗ not open');
				tooltip.hide();
				console.log('4. tooltip.hide() open state:', tooltip.open === false ? '✓ closed' : '✗ not closed');
			}, 50);
		</script>
	</body>
</html>
